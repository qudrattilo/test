
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IC3 GS6 Level 1 – Тренировочный тест</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>IC3 GS6 Уровень 1</h1>
            <p class="subtitle">Пробный тест: 45 случайных вопросов из 80</p>
        </header>

        <div id="startBlock">
            <p>Тест содержит вопросы четырёх типов:</p>
            <ul>
                <li><strong>Одиночный выбор</strong> – один правильный ответ</li>
                <li><strong>Множественный выбор</strong> – 2–3 правильных ответа</li>
                <li><strong>Верно / Неверно</strong></li>
                <li><strong>Сопоставление</strong></li>
            </ul>
            <button id="startBtn">Начать тест</button>
        </div>

        <div id="testBlock" class="hidden">
            <form id="testForm"></form>
            <div class="actions">
                <button id="submitBtn">Проверить результаты</button>
            </div>
        </div>

        <div id="resultBlock" class="hidden">
            <h2>Результаты</h2>
            <div id="scoreDisplay"></div>
            <div id="detailedResults"></div>
            <button id="retryBtn">Пройти ещё раз</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
